<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #efefef;
      color: #222;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 48px;
    }

    .logo {
      font-size: 42px;
      font-weight: bold;
      color: #1f2390;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 36px;
    }

    .nav-links a {
      text-decoration: none;
      color: #222;
      font-size: 20px;
    }

    .contact-btn {
      background: #1f2390;
      color: white !important;
      padding: 14px 26px;
      text-transform: uppercase;
      letter-spacing: 3px;
      font-size: 14px;
    }

    .hero {
      height: calc(100vh - 100px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .hero h1 {
      font-size: 64px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .hero p {
      font-size: 22px;
      color: #444;
    }
  </style>
</head>

<body>

  <header class="navbar">
    <div class="logo">iy</div>

    <nav class="nav-links">
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Projects</a>
      <a class="contact-btn" href="mailto:isabel.g.yuan@gmail.com?subject=Portfolio%20Inquiry">
        CONTACT
      </a>
    </nav>
  </header>

  <main class="hero">
    <h1>Portfolio currently being updated.</h1>
    <p>Coming soon April 21, 2026.</p>
  </main>

</body>
</html>
